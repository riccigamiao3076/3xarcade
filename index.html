<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Game Arcade Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        .multiplayer-panel {
            grid-column: span 3;
            background: #252525;
            border: 3px solid #00bcd4;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }
        @media (max-width: 1000px) { .multiplayer-panel { grid-column: span 1; width: 320px; box-sizing: border-box; } }
        .mp-input { background: #111; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; font-family: monospace; width: 140px; }
        .mp-btn { background: #00bcd4; color: #111; border: none; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .mp-btn:hover { background: #00e5ff; }
        .mp-btn.secondary { background: #444; color: #fff; margin-left: 5px; }
        .mp-btn.secondary:hover { background: #555; }
        .peer-id-display { font-family: monospace; color: #00bcd4; font-weight: bold; background: #111; padding: 5px 10px; border-radius: 4px; letter-spacing: 1px; }
        
        /* Shared CSS overlay utility rule */
        .game-overlay-style {
            display: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 10; 
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        
        <div class="multiplayer-panel">
            <div>
                <strong>Room Code:</strong> <span id="my-peer-id" class="peer-id-display">Generating...</span>
                <button id="share-btn" class="mp-btn secondary" onclick="copyInviteLink()" style="display:none;">📋 Copy Invite Link</button>
            </div>
            <div id="join-section" style="display: flex; gap: 8px; align-items: center;">
                <input type="text" id="remote-peer-id" class="mp-input" placeholder="Enter Room Code...">
                <button class="mp-btn" onclick="connectToFriend()">Join Room</button>
            </div>
            <div id="connection-status" style="color: #aaa; font-size: 14px;">Status: Offline Sandbox</div>
        </div>
        
        <div class="game-box">
            <div class="game-header">
                <span>⚓ Battleship</span>
                <select id="size-battleship" class="toggle-btn" onchange="changeGameSize('battleship', parseInt(this.value), true)">
                    <option value="6">Size: 6x6</option>
                    <option value="8">Size: 8x8</option>
                    <option value="12">Size: 12x12</option>
                </select>
            </div>
            <div id="status-battleship" class="status-bar">P1: Place ships</div>
            <div style="position: relative; width: 320px; height: 360px;">
                <canvas id="canvas-battleship" width="320" height="360"></canvas>
                <img id="bs-overlay-img" class="game-overlay-style" src="" alt="Game Result">
            </div>
        </div>

        <div class="game-box">
            <div class="game-header">
                <span>🔴 Connect 4</span>
                <select id="size-connect4" class="toggle-btn" onchange="changeGameSize('connect4', parseInt(this.value), true)">
                    <option value="6">Size: 6x6</option>
                    <option value="8">Size: 8x8</option>
                    <option value="12">Size: 12x12</option>
                </select>
            </div>
            <div id="status-connect4" class="status-bar">Player 1 (Red) Turn</div>
            <div style="position: relative; width: 320px; height: 360px;">
                <canvas id="canvas-connect4" width="320" height="360"></canvas>
                <img id="c4-overlay-img" class="game-overlay-style" src="" alt="Game Result">
            </div>
        </div>

        <div class="game-box">
            <div class="game-header">
                <span>✏️ Dots & Boxes</span>
                <select id="size-dots" class="toggle-btn" onchange="changeGameSize('dots', parseInt(this.value), true)">
                    <option value="6">Grid: 6x6</option>
                    <option value="8">Grid: 8x8</option>
                    <option value="12">Grid: 12x12</option>
                </select>
            </div>
            <div id="status-dots" class="status-bar">P1: Draw a line</div>
            <div style="position: relative; width: 320px; height: 360px;">
                <canvas id="canvas-dots" width="320" height="360"></canvas>
                <img id="dots-overlay-img" class="game-overlay-style" src="" alt="Game Result">
            </div>
        </div>

    </div>
    <script src="game.js"></script>
</body>
</html>
